name: opencode

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  opencode:
    if: >-
      github.actor != 'opencode-agent[bot]' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
      statuses: write

    steps:
      - name: Resolve automation route
        id: route
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const eventName = context.eventName;
            const payload = context.payload;
            const repository = payload.repository;
            const defaultBranch = repository?.default_branch || 'main';
            const commentBody = payload.comment?.body || '';
            const hasCommand = /(^|\s)\/(oc|opencode)\b/i.test(commentBody);
            const sameRepoFullName = `${context.repo.owner}/${context.repo.repo}`;

            function slugify(value) {
              return String(value || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .slice(0, 40) || 'work';
            }

            function issueBranch(issueNumber, title) {
              return `automation/issue-${issueNumber}-${slugify(title)}`;
            }

            const outputs = {
              should_run: 'false',
              run_kind: '',
              agent: '',
              issue_number: '',
              pr_number: '',
              title: '',
              body: '',
              comment_body: commentBody,
              default_branch: defaultBranch,
              base_ref: '',
              head_ref: '',
              head_sha: '',
              previous_head_sha: '',
              checkout_repository: sameRepoFullName,
              checkout_ref: defaultBranch,
              is_pr_context: 'false',
              head_repo_full_name: '',
              same_repo_pr: 'false',
              working_branch: '',
            };

            async function loadPr(prNumber) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              outputs.pr_number = String(pr.number);
              outputs.issue_number = String(pr.number);
              outputs.title = pr.title || '';
              outputs.body = pr.body || '';
              outputs.base_ref = pr.base.ref || defaultBranch;
              outputs.head_ref = pr.head.ref || '';
              outputs.head_sha = pr.head.sha || '';
              outputs.checkout_repository = pr.head.repo?.full_name || sameRepoFullName;
              outputs.head_repo_full_name = pr.head.repo?.full_name || '';
              outputs.same_repo_pr = String((pr.head.repo?.full_name || sameRepoFullName) === sameRepoFullName);
              outputs.is_pr_context = 'true';
            }

            if (eventName === 'pull_request') {
              const pr = payload.pull_request;
              if (pr && pr.draft !== true) {
                outputs.should_run = 'true';
                outputs.run_kind = 'pr_review';
                outputs.agent = 'reviewer';
                outputs.pr_number = String(pr.number);
                outputs.issue_number = String(pr.number);
                outputs.title = pr.title || '';
                outputs.body = pr.body || '';
                outputs.base_ref = pr.base?.ref || defaultBranch;
                outputs.head_ref = pr.head?.ref || '';
                outputs.head_sha = pr.head?.sha || '';
                outputs.previous_head_sha = payload.before || '';
                outputs.checkout_repository = pr.head?.repo?.full_name || sameRepoFullName;
                outputs.head_repo_full_name = pr.head?.repo?.full_name || '';
                outputs.same_repo_pr = String((pr.head?.repo?.full_name || sameRepoFullName) === sameRepoFullName);
                outputs.is_pr_context = 'true';
              }
            } else if (eventName === 'issues') {
              const issue = payload.issue;
              if (issue && !issue.pull_request) {
                outputs.should_run = 'true';
                outputs.run_kind = 'issue_open';
                outputs.agent = 'implementer';
                outputs.issue_number = String(issue.number);
                outputs.title = issue.title || '';
                outputs.body = issue.body || '';
                outputs.working_branch = issueBranch(issue.number, issue.title);
              }
            } else if (eventName === 'issue_comment' && hasCommand) {
              const issue = payload.issue;
              if (issue?.pull_request) {
                await loadPr(issue.number);
                outputs.should_run = 'true';
                outputs.run_kind = 'pr_comment_implement';
                outputs.agent = 'implementer';
              } else if (issue) {
                outputs.should_run = 'true';
                outputs.run_kind = 'issue_comment_implement';
                outputs.agent = 'implementer';
                outputs.issue_number = String(issue.number);
                outputs.title = issue.title || '';
                outputs.body = issue.body || '';
                outputs.working_branch = issueBranch(issue.number, issue.title);
              }
            } else if (eventName === 'pull_request_review_comment' && hasCommand) {
              const prNumber = payload.pull_request?.number;
              if (prNumber) {
                await loadPr(prNumber);
                outputs.should_run = 'true';
                outputs.run_kind = 'pr_review_comment_implement';
                outputs.agent = 'implementer';
              }
            }

            if (outputs.should_run === 'true' && outputs.is_pr_context === 'true') {
              outputs.checkout_ref = outputs.head_ref || `refs/pull/${outputs.pr_number}/head`;
            }

            for (const [key, value] of Object.entries(outputs)) {
              core.setOutput(key, value);
            }

      - name: Checkout repository
        if: steps.route.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.route.outputs.checkout_repository }}
          ref: ${{ steps.route.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        if: steps.route.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        if: steps.route.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install runtime dependencies
        if: steps.route.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep tmux openjdk-21-jdk-headless
          npx -y playwright@latest install --with-deps chromium
          npm install -g bash-language-server pyright typescript typescript-language-server opentmux opencode-swarm-plugin @playwright/mcp
          curl -fsSL https://opencode.ai/install | bash -s -- --version 1.15.11 --no-modify-path
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Install project-local OpenCode plugin dependencies
        if: steps.route.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .opencode/package.json ]]; then
            bun install --cwd .opencode
          fi

      - name: Preinstall npm OpenCode plugins
        if: steps.route.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/opencode"
          python3 - <<'PY'
          import json
          import pathlib

          path = pathlib.Path.home() / '.cache' / 'opencode' / 'package.json'
          path.write_text(json.dumps({
              'name': 'opencode-plugin-cache',
              'private': True,
              'dependencies': {
                  '@zenobius/opencode-background': '0.1.0-alpha.2',
                  'opencode-agent-skills': '0.7.0',
                  'opencode-agent-memory': '0.2.0',
                  '@spoons-and-mirrors/subtask2': '0.3.5',
                  'opentmux': '1.5.7',
                  '@tarquinen/opencode-dcp': '3.1.12',
                  'opencode-swarm-plugin': '0.63.2'
              }
          }, indent=2) + '\n', encoding='utf-8')
          PY
          bun install --cwd "$HOME/.cache/opencode"

      - name: Configure OpenCode integration
        if: steps.route.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.opencode/bin:$PATH"
          swarm setup

      - name: Check dependencies
        if: steps.route.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.opencode/bin:$PATH"
          swarm doctor

      - name: Verify OpenCode toolchain
        if: steps.route.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.opencode/bin:$PATH"
          node --version
          npm --version
          bun --version
          java --version
          tmux -V
          rg --version
          bash-language-server --version
          pyright --version
          typescript-language-server --version
          npx -y @playwright/mcp@latest --help >/dev/null
          opencode --version
          opencode mcp list || true
          swarm --version
          opentmux --version

      - name: Configure git author
        if: steps.route.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'opencode-agent[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Prepare implementation branch
        if: >-
          steps.route.outputs.should_run == 'true' &&
          (steps.route.outputs.run_kind == 'issue_open' || steps.route.outputs.run_kind == 'issue_comment_implement')
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ steps.route.outputs.default_branch }}
          WORKING_BRANCH: ${{ steps.route.outputs.working_branch }}
        run: |
          set -euo pipefail
          git fetch origin "$DEFAULT_BRANCH" "$WORKING_BRANCH" || git fetch origin "$DEFAULT_BRANCH"
          if git show-ref --verify --quiet "refs/remotes/origin/$WORKING_BRANCH"; then
            git checkout -B "$WORKING_BRANCH" "origin/$WORKING_BRANCH"
          else
            git checkout -B "$WORKING_BRANCH" "origin/$DEFAULT_BRANCH"
          fi

      - name: Compose OpenCode prompt
        if: steps.route.outputs.should_run == 'true'
        id: prompt
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_KIND: ${{ steps.route.outputs.run_kind }}
          ISSUE_NUMBER: ${{ steps.route.outputs.issue_number }}
          PR_NUMBER: ${{ steps.route.outputs.pr_number }}
          DEFAULT_BRANCH: ${{ steps.route.outputs.default_branch }}
          WORKING_BRANCH: ${{ steps.route.outputs.working_branch }}
          BASE_REF: ${{ steps.route.outputs.base_ref }}
          HEAD_REF: ${{ steps.route.outputs.head_ref }}
          HEAD_SHA: ${{ steps.route.outputs.head_sha }}
          PREVIOUS_HEAD_SHA: ${{ steps.route.outputs.previous_head_sha }}
          TITLE: ${{ steps.route.outputs.title }}
          BODY: ${{ steps.route.outputs.body }}
          COMMENT_BODY: ${{ steps.route.outputs.comment_body }}
          HEAD_REPO_FULL_NAME: ${{ steps.route.outputs.head_repo_full_name }}
          SAME_REPO_PR: ${{ steps.route.outputs.same_repo_pr }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import time

          run_kind = os.environ['RUN_KIND']
          repository = os.environ['REPOSITORY']
          issue_number = os.environ.get('ISSUE_NUMBER', '')
          pr_number = os.environ.get('PR_NUMBER', '')
          default_branch = os.environ.get('DEFAULT_BRANCH', '')
          working_branch = os.environ.get('WORKING_BRANCH', '')
          base_ref = os.environ.get('BASE_REF', '')
          head_ref = os.environ.get('HEAD_REF', '')
          head_sha = os.environ.get('HEAD_SHA', '')
          previous_head_sha = os.environ.get('PREVIOUS_HEAD_SHA', '')
          title = os.environ.get('TITLE', '')
          body = os.environ.get('BODY', '')
          comment_body = os.environ.get('COMMENT_BODY', '')
          head_repo_full_name = os.environ.get('HEAD_REPO_FULL_NAME', '')
          same_repo_pr = os.environ.get('SAME_REPO_PR', '')

          def block(*lines):
              return "\n".join(lines).rstrip() + "\n"

          def review_context_lines():
              lines = []
              if previous_head_sha:
                  lines.extend([
                      'This run was triggered by newly pushed commits on an existing PR. Review the incremental range first before broadening scope.',
                      f'Previous PR head SHA: {previous_head_sha}',
                      f'Incremental commit range: {previous_head_sha}..{head_sha}',
                      f'Incremental diff command: git --no-pager diff {previous_head_sha}..{head_sha}',
                      '',
                  ])
              return lines

          prompts = {
              'pr_review': block(
                  'You are running inside a non-interactive GitHub Actions pull-request review workflow.',
                  'This workflow installed Node.js, Bun, ripgrep, Playwright MCP/browser prerequisites, and the OpenCode CLI, then invoked `opencode run` directly from the repository root.',
                  'Never ask the user, PR author, client, or workflow operator for clarification, approval, or permission.',
                  'Use the checked-in OpenCode configuration from the repository-root opencode.json plus the agents, commands, skills, and instructions under .opencode/.',
                  'Use the configured GitHub and Playwright MCP servers when they materially improve repository context or browser/UI validation.',
                  'Review the code on the checked-out PR branch and leave high-signal review feedback only.',
                  'Do not modify repository files during this run.',
                  f'In detached CI checkouts, do not assume a local main branch exists. Prefer git diff origin/{base_ref}...HEAD when you need the branch diff.',
                  *review_context_lines(),
                  'If there are no significant issues, output exactly: No significant issues found in the reviewed changes.',
                  '',
                  f'Repository: {repository}',
                  f'Pull request: #{pr_number}',
                  f'Base branch: {base_ref}',
                  f'Head branch: {head_ref}',
                  f'Head SHA: {head_sha}',
                  '',
                  'PR title:',
                  title,
                  '',
                  'PR description:',
                  body,
              ),
              'issue_open': block(
                  'You are running inside a non-interactive GitHub Actions issue implementation workflow.',
                  'This workflow installed Node.js, Bun, ripgrep, Playwright MCP/browser prerequisites, and the OpenCode CLI, then invoked `opencode run` directly from the repository root.',
                  'Never ask the user, reporter, client, or workflow operator for clarification, approval, or permission.',
                  'Act like a senior full-stack engineer: understand the relevant code path before editing, then implement the requested change instead of stopping at analysis.',
                  'Treat the issue as an implementation request: inspect the code, install or refresh project dependencies when needed, write code, build or compile the requested change, run relevant validation, and report the outcome.',
                  f'Do not commit directly to the default branch {default_branch}. Create or update the dedicated working branch {working_branch} from {default_branch}, commit the resulting changes there, and open or update a pull request back to {default_branch} when code changes are required.',
                  'The pull request must come from that non-default working branch and must include a concrete description with summary, validation, linked issue context, and the commits included in the branch.',
                  'Use the configured GitHub and Playwright MCP servers when they materially improve repository context or browser/UI validation.',
                  'Use the issue title and body as the source of truth. If something is ambiguous, choose the safest reasonable interpretation and continue.',
                  '',
                  f'Repository: {repository}',
                  f'Issue: #{issue_number}',
                  f'Default branch: {default_branch}',
                  f'Working branch: {working_branch}',
                  '',
                  'Issue title:',
                  title,
                  '',
                  'Issue description:',
                  body,
              ),
              'issue_comment_implement': block(
                  'You are running inside a non-interactive GitHub Actions issue-comment implementation workflow.',
                  'This workflow installed Node.js, Bun, ripgrep, Playwright MCP/browser prerequisites, and the OpenCode CLI, then invoked `opencode run` directly from the repository root.',
                  'Never ask the user, reporter, client, or workflow operator for clarification, approval, or permission.',
                  'Act like a senior full-stack engineer: understand the relevant code path before editing, then implement the requested change instead of stopping at analysis.',
                  'Treat the /oc comment as a request to implement the described change, not just to explain it. Install or refresh project dependencies when needed and run a real build, compile, test, or equivalent validation step when feasible.',
                  f'Do not commit directly to the default branch {default_branch}. Create or update the dedicated working branch {working_branch} from {default_branch}, commit the resulting changes there, and open or update a pull request back to {default_branch} when code changes are required.',
                  'The pull request must come from that non-default working branch and must include a concrete description with summary, validation, linked issue context, and the commits included in the branch.',
                  'Use the configured GitHub and Playwright MCP servers when they materially improve repository context or browser/UI validation.',
                  'Use the original issue plus the trigger comment together as the specification. If there is conflict, the trigger comment takes priority.',
                  '',
                  f'Repository: {repository}',
                  f'Issue: #{issue_number}',
                  f'Default branch: {default_branch}',
                  f'Working branch: {working_branch}',
                  '',
                  'Issue title:',
                  title,
                  '',
                  'Issue description:',
                  body,
                  '',
                  'Trigger comment:',
                  comment_body,
              ),
              'pr_comment_implement': block(
                  'You are running inside a non-interactive GitHub Actions pull-request comment implementation workflow.',
                  'This workflow installed Node.js, Bun, ripgrep, Playwright MCP/browser prerequisites, and the OpenCode CLI, then invoked `opencode run` directly from the repository root.',
                  'Never ask the user, PR author, client, or workflow operator for clarification, approval, or permission.',
                  'Act like a senior full-stack engineer: understand the relevant code path before editing, then implement the requested change instead of stopping at analysis.',
                  'Treat the /oc comment as a request to implement the described changes directly on the current pull-request branch. Install or refresh project dependencies when needed and run a real build, compile, test, or equivalent validation step when feasible.',
                  f'Work on the checked-out PR head branch {head_ref}. Commit the requested changes directly on that PR branch when write access exists, run relevant validation, and inspect the exact new commits or diff you introduced before finishing.',
                  'After a successful push, the follow-up pull_request synchronize run will review the new commits. Keep the implementation commit focused and reviewable.',
                  'If this PR comes from a fork and write access is unavailable, explain the limitation clearly and provide the concrete patch or next step instead of blocking.',
                  'Use the configured GitHub and Playwright MCP servers when they materially improve repository context or browser/UI validation.',
                  '',
                  f'Repository: {repository}',
                  f'Pull request: #{pr_number}',
                  f'Base branch: {base_ref}',
                  f'Head branch: {head_ref}',
                  f'Head SHA at start: {head_sha}',
                  f'Head repository: {head_repo_full_name}',
                  f'Same-repo PR: {same_repo_pr}',
                  '',
                  'PR title:',
                  title,
                  '',
                  'PR description:',
                  body,
                  '',
                  'Trigger comment:',
                  comment_body,
              ),
              'pr_review_comment_implement': block(
                  'You are running inside a non-interactive GitHub Actions pull-request review-comment implementation workflow.',
                  'This workflow installed Node.js, Bun, ripgrep, Playwright MCP/browser prerequisites, and the OpenCode CLI, then invoked `opencode run` directly from the repository root.',
                  'Never ask the user, PR author, client, or workflow operator for clarification, approval, or permission.',
                  'Act like a senior full-stack engineer: understand the relevant code path before editing, then implement the requested change instead of stopping at analysis.',
                  'Treat the /oc inline review comment as a request to implement the described change directly on the current pull-request branch. Install or refresh project dependencies when needed and run a real build, compile, test, or equivalent validation step when feasible.',
                  f'Work on the checked-out PR head branch {head_ref}. Commit the requested changes directly on that PR branch when write access exists, run relevant validation, and inspect the exact new commits or diff you introduced before finishing.',
                  'After a successful push, the follow-up pull_request synchronize run will review the new commits. Keep the implementation commit focused and reviewable.',
                  'If this PR comes from a fork and write access is unavailable, explain the limitation clearly and provide the concrete patch or next step instead of blocking.',
                  'Use the configured GitHub and Playwright MCP servers when they materially improve repository context or browser/UI validation.',
                  '',
                  f'Repository: {repository}',
                  f'Pull request: #{pr_number}',
                  f'Base branch: {base_ref}',
                  f'Head branch: {head_ref}',
                  f'Head SHA at start: {head_sha}',
                  f'Head repository: {head_repo_full_name}',
                  f'Same-repo PR: {same_repo_pr}',
                  '',
                  'PR title:',
                  title,
                  '',
                  'PR description:',
                  body,
                  '',
                  'Trigger review comment:',
                  comment_body,
              ),
          }

          if run_kind not in prompts:
              raise SystemExit(f'Unsupported run kind: {run_kind}')

          delim = f'OPENCODE_PROMPT_{time.time_ns()}'
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'prompt<<{delim}\n{prompts[run_kind]}\n{delim}\n')
          PY

      - name: Run OpenCode automation
        if: steps.route.outputs.should_run == 'true'
        id: opencode_run
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_OPENAI_API_KEY1: ${{ secrets.AZURE_OPENAI_API_KEY1 }}
          OPENCODE_CONFIG: ${{ github.workspace }}/opencode.json
          OPENCODE_PERMISSION: >-
            {"*":"allow","question":"deny","read":"allow","glob":"allow","grep":"allow","list":"allow","lsp":"allow","skill":{"*":"allow"},"webfetch":"allow","websearch":"allow","task":"deny","todowrite":"allow","repo_overview":"allow","repo_clone":"allow","external_directory":"allow","edit":"allow","github_*":"allow","context7_*":"allow","playwright_*":"allow","bash":{"*":"allow","rm -rf *":"deny"}}
          OPENCODE_PROMPT: ${{ steps.prompt.outputs.prompt }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.opencode/bin:$PATH"

          prompt_file="$RUNNER_TEMP/opencode-prompt.txt"
          log_file="$RUNNER_TEMP/opencode-run.log"
          printf '%s\n' "$OPENCODE_PROMPT" > "$prompt_file"

          echo "::group::OpenCode automation"
          set +e
          opencode run \
            --model azure-foundry/gpt-5.4 \
            --agent "${{ steps.route.outputs.agent }}" \
            "$(cat "$prompt_file")" \
            2>&1 | sed -u 's/^/[opencode] /' | tee "$log_file"
          opencode_exit=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"
          echo "exit_code=$opencode_exit" >> "$GITHUB_OUTPUT"

          if [[ "$opencode_exit" != "0" ]]; then
            echo "OpenCode exited with status $opencode_exit; post-run finalization will still execute if applicable."
          fi

      - name: Finalize issue implementation branch and pull request
        if: >-
          always() &&
          steps.route.outputs.should_run == 'true' &&
          (steps.route.outputs.run_kind == 'issue_open' || steps.route.outputs.run_kind == 'issue_comment_implement')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.route.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.route.outputs.title }}
          DEFAULT_BRANCH: ${{ steps.route.outputs.default_branch }}
          WORKING_BRANCH: ${{ steps.route.outputs.working_branch }}
        run: |
          set -euo pipefail

          git fetch origin "$DEFAULT_BRANCH" "$WORKING_BRANCH" || git fetch origin "$DEFAULT_BRANCH"

          current_branch="$(git branch --show-current)"
          if [[ "$current_branch" != "$WORKING_BRANCH" ]]; then
            git checkout -B "$WORKING_BRANCH"
          fi

          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore(automation): apply issue #$ISSUE_NUMBER updates"
          fi

          ahead_count="$(git rev-list --count "origin/$DEFAULT_BRANCH..HEAD")"
          if [[ "$ahead_count" == "0" ]]; then
            echo "No commits ahead of origin/$DEFAULT_BRANCH; skipping PR sync."
            exit 0
          fi

          git push --set-upstream origin "$WORKING_BRANCH"

          commit_list="$(git log --reverse --pretty=format:'- %h %s' "origin/$DEFAULT_BRANCH..HEAD")"
          if [[ -z "$commit_list" ]]; then
            commit_list='- No additional commits recorded.'
          fi

          pr_title="$ISSUE_TITLE"
          pr_body_file="$RUNNER_TEMP/opencode-pr-body.md"
          ISSUE_NUMBER="$ISSUE_NUMBER" ISSUE_TITLE="$ISSUE_TITLE" COMMIT_LIST="$commit_list" PR_BODY_FILE="$pr_body_file" python3 - <<'PY'
          import os
          from pathlib import Path

          issue_number = os.environ['ISSUE_NUMBER']
          issue_title = os.environ['ISSUE_TITLE']
          commit_list = os.environ.get('COMMIT_LIST', '').strip() or '- No additional commits recorded.'

          body = "\n".join([
              '## Summary',
              f'- Automated implementation for issue #{issue_number}.',
              f'- Source issue title: {issue_title}',
              '',
              '## Validation',
              '- Executed the OpenCode GitHub Actions automation workflow for this issue.',
              '- Review this workflow run for the complete agent log and any command output.',
              '',
              '## Commits',
              commit_list,
              '',
              '## Linked issue',
              f'Closes #{issue_number}',
              '',
          ])
          Path(os.environ['PR_BODY_FILE']).write_text(body, encoding='utf-8')
          PY

          existing_pr_number="$(gh pr list --head "$WORKING_BRANCH" --base "$DEFAULT_BRANCH" --state open --json number --jq '.[0].number // empty')"

          if [[ -n "$existing_pr_number" ]]; then
            gh pr edit "$existing_pr_number" --title "$pr_title" --body-file "$pr_body_file"
            echo "Updated PR #$existing_pr_number for $WORKING_BRANCH"
          else
            gh pr create --base "$DEFAULT_BRANCH" --head "$WORKING_BRANCH" --title "$pr_title" --body-file "$pr_body_file"
          fi

      - name: Finalize PR branch after implementation comments
        if: >-
          always() &&
          steps.route.outputs.should_run == 'true' &&
          (steps.route.outputs.run_kind == 'pr_comment_implement' || steps.route.outputs.run_kind == 'pr_review_comment_implement') &&
          steps.route.outputs.same_repo_pr == 'true'
        shell: bash
        env:
          HEAD_REF: ${{ steps.route.outputs.head_ref }}
        run: |
          set -euo pipefail

          if [[ -z "$HEAD_REF" ]]; then
            echo "PR head branch is unavailable; skipping PR branch finalization."
            exit 0
          fi

          git fetch origin "$HEAD_REF"

          current_branch="$(git branch --show-current)"
          if [[ "$current_branch" != "$HEAD_REF" ]]; then
            git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
          fi

          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore(automation): apply PR feedback updates"
          fi

          ahead_count="$(git rev-list --count "origin/$HEAD_REF..HEAD")"
          if [[ "$ahead_count" == "0" ]]; then
            echo "No commits ahead of origin/$HEAD_REF; skipping PR branch push."
            exit 0
          fi

          git push --set-upstream origin "$HEAD_REF"
